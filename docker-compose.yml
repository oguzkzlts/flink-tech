volumes:
  kafka-data:
  zookeeper-data:
  prometheus-data:
  grafana-data:

services:
  schema-registry:
    image: ghcr.io/aiven-open/karapace:latest
    container_name: schema-registry
    ports:
      - "8082:8081"
    environment:
      KARAPACE_BOOTSTRAP_URI: kafka:9092
      KARAPACE_HOST: 0.0.0.0
      KARAPACE_PORT: 8081
    depends_on:
      - kafka

  zookeeper:
    image: confluentinc/cp-zookeeper:7.0.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    volumes:
      - zookeeper-data:/var/lib/zookeeper
      - ./zoo.cfg:/etc/kafka/zookeeper.properties
    command:
      - sh
      - -c
      - "zookeeper-server-start /etc/kafka/zookeeper.properties"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.0.1
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_JMX_PORT: 9998
      KAFKA_JMX_HOSTNAME: kafka
    ports:
      - "29092:29092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server kafka:9092 --list || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 20

  jobmanager:
    image: flink:1.20.1
    command: jobmanager
    ports:
      - "8081:8081"
    environment:
      JOB_MANAGER_RPC_ADDRESS: jobmanager
      ENABLE_JMX: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081"]
      interval: 5s
      timeout: 10s
      retries: 10

  taskmanager:
    image: flink:1.20.1
    command: taskmanager
    depends_on:
      jobmanager:
        condition: service_healthy
    environment:
      JOB_MANAGER_RPC_ADDRESS: jobmanager
      TASK_MANAGER_NUMBER_OF_TASK_SLOTS: "2"
      ENABLE_JMX: "true"
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -i '[t]askmanager' || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 10

  kafka-topic-creator:
    image: confluentinc/cp-kafka:7.0.1
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint:
      - sh
      - -c
      - |
        timeout 60 bash -c '
          until kafka-topics --bootstrap-server kafka:9092 --list >/dev/null 2>&1; do
            echo "Waiting for Kafka metadata service..."
            sleep 2
          done
        ' || { echo "ERROR: Kafka timeout"; exit 1; }

        timeout 30 kafka-topics --bootstrap-server kafka:9092 \
          --create --if-not-exists \
          --topic crypto-prices --partitions 3 --replication-factor 1 || \
          { echo "ERROR: Failed to create crypto-prices"; exit 1; }

        timeout 30 kafka-topics --bootstrap-server kafka:9092 \
          --create --if-not-exists \
          --topic alerts --partitions 3 --replication-factor 1 || \
          { echo "ERROR: Failed to create alerts"; exit 1; }

        timeout 30 kafka-topics --bootstrap-server kafka:9092 \
          --create --if-not-exists \
          --topic dead-letters --partitions 1 --replication-factor 1 || \
          { echo "ERROR: Failed to create dead-letters"; exit 1; }

        timeout 30 kafka-topics --bootstrap-server kafka:9092 \
          --create --if-not-exists \
          --topic anomalies --partitions 3 --replication-factor 1 || \
          { echo "ERROR: Failed to create anomalies"; exit 1; }

        timeout 30 kafka-topics --bootstrap-server kafka:9092 \
          --create --if-not-exists \
          --topic aggregated-prices --partitions 3 --replication-factor 1 || \
          { echo "ERROR: Failed to create aggregated-prices"; exit 1; }

        timeout 10 kafka-topics --bootstrap-server kafka:9092 --list
        echo "Topics ready at $(date)"
        exit 0

  crypto-producer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crypto-producer
    depends_on:
      kafka-topic-creator:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_INPUT_TOPIC: crypto-prices
      CURRENCIES_RESOURCE: tracked-currencies.json
    command:
      - sh
      - -c
      - |
        echo "Starting CryptoPriceProducer..."
        java -cp /opt/flink/usrlib/FlinkTech-1.0-SNAPSHOT.jar \
          org.example.flink.ingestion.CryptoPriceProducer
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -i '[C]ryptoPriceProducer' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  flink-job:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      kafka-topic-creator:
        condition: service_completed_successfully
      jobmanager:
        condition: service_healthy
      taskmanager:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        echo "Starting Flink job..."
        /opt/flink/bin/flink run \
          -m jobmanager:8081 \
          -c org.example.flink.job.ProductionKafkaStreamingJob \
          /opt/flink/usrlib/FlinkTech-1.0-SNAPSHOT.jar \
          --env dev
        
        tail -f /dev/null
    ports:
      - "9999:9999"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 5s
      timeout: 5s
      retries: 10

  pushgateway:
    image: prom/pushgateway:latest
    container_name: pushgateway
    ports:
      - "9091:9091"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9091/-/healthy"]
      interval: 5s
      timeout: 5s
      retries: 10

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3000
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 5s
      timeout: 5s
      retries: 10
